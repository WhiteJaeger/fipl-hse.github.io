name: Deployment

on:
  workflow_dispatch:

jobs:
  Deploy:
    name: Deploy
    runs-on: ubuntu-latest

    steps:

      - name: Set up Python 3.x
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Display Payload
        run: |
          echo ${{ github.event }}
          echo ${{ fromJSON(github.event) }}
